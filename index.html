<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0b14" />
    <title>BrowserCoin — a cryptocurrency that lives in your browser</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img class="brand-mark" src="/logo.png" alt="BrowserCoin logo" />
        <div>
          <div class="brand-name">BrowserCoin</div>
          <div class="brand-tagline">a cryptocurrency that lives in your browser</div>
        </div>
      </div>
      <nav class="nav-tabs" data-nav>
        <button class="nav-tab" data-route="/">Home</button>
        <button class="nav-tab" data-route="/wallet">Wallet</button>
        <button class="nav-tab" data-route="/mine">Mine</button>
        <button class="nav-tab" data-route="/explorer">Explorer</button>
        <button class="nav-tab" data-route="/mempool">Mempool</button>
        <button class="nav-tab" data-route="/settings">Settings</button>
      </nav>
      <div class="netstats">
        <span class="stat"><span class="stat-dot" data-stat-dot="net"></span><span data-stat="height">height —</span></span>
        <span class="stat" data-stat="miners">miners —</span>
        <span class="stat" data-stat="peers">peers —</span>
        <span class="stat" data-stat="mempool">mempool —</span>
        <span class="stat" data-stat="difficulty">diff —</span>
      </div>
    </header>

    <main data-view-root></main>

    <footer class="sitefoot">
      <span class="sitefoot-text">BrowserCoin · a cryptocurrency that lives in your browser</span>
      <a class="sitefoot-link" href="https://github.com/swompythesecond/BrowserCoin" target="_blank" rel="noopener noreferrer" aria-label="View source on GitHub">
        <svg class="sitefoot-icon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="currentColor">
          <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.57.1.78-.25.78-.55 0-.27-.01-.99-.02-1.94-3.2.7-3.87-1.54-3.87-1.54-.52-1.32-1.27-1.67-1.27-1.67-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.75 2.69 1.24 3.34.95.1-.74.4-1.24.72-1.53-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.29 1.18-3.09-.12-.29-.51-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11.1 11.1 0 0 1 5.79 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.76.12 3.05.74.8 1.18 1.83 1.18 3.09 0 4.42-2.69 5.39-5.26 5.68.41.35.78 1.05.78 2.12 0 1.53-.01 2.76-.01 3.13 0 .3.21.66.79.55C20.21 21.38 23.5 17.07 23.5 12 23.5 5.65 18.35.5 12 .5Z"/>
        </svg>
        <span>View on GitHub</span>
      </a>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
